<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>INGLES CONNECT</title>
  <meta name="description" content="Herramienta para procesar y resolver ejercicios de Connect de forma eficiente.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="logo">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="4 7 4 4 20 4 20 7" />
        <line x1="9" y1="20" x2="15" y2="20" />
        <line x1="12" y1="4" x2="12" y2="20" />
      </svg>
      INGLES CONNECT
    </div>
    <div class="hrow">
      <button class="btn-ghost" id="ai-config-btn" title="Activar" style="color:var(--pr);border-color:var(--pr);">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        Activar
      </button>
      <button class="btn-ghost" id="clr-all-btn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
          <path d="M10 11v6M14 11v6M9 6V4h6v2" />
        </svg>
        Limpiar todo
      </button>
      <button class="btn-ic" id="theme-btn" title="Tema">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>
    </div>
  </header>

  <div class="workspace">
    <div class="panel">
      <div class="ph">
        <span class="pl"><span class="dot"></span>Pegar HTML</span>
      </div>
      <div class="pb" style="padding:0">
        <textarea id="hi" placeholder="Pega el HTML de cada pregunta de Connect...

Luego presiona Agregar pregunta.
Repite para cada pregunta del assignment.

Ctrl+Enter = agregar rapido"></textarea>
      </div>
      <div class="add-zone">
        <div class="status-row">
          <span class="status-txt" id="status-txt">Sin preguntas agregadas</span>
          <span class="count-badge" id="count-badge" style="display:none">0</span>
        </div>
        <button class="btn-add" id="add-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Agregar pregunta
        </button>
      </div>
    </div>

    <div class="panel">
      <div class="ph">
        <span class="pl"><span class="dot" style="background:var(--ac)"></span>Lista de preguntas</span>
        <div style="display:flex;gap:8px;align-items:center;">
          <span id="total-badge" style="font-size:11px;color:var(--mu);font-weight:600"></span>
          <button class="btn-ghost" id="resolve-all-btn" style="border-color:var(--pr);color:var(--pr);display:none;padding:3px 8px;">Completar Todo</button>
        </div>
      </div>
      <div class="pb" id="q-list-area">
        <div class="es">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="8" y1="6" x2="21" y2="6" /><line x1="8" y1="12" x2="21" y2="12" /><line x1="8" y1="18" x2="21" y2="18" />
            <line x1="3" y1="6" x2="3.01" y2="6" /><line x1="3" y1="12" x2="3.01" y2="12" /><line x1="3" y1="18" x2="3.01" y2="18" />
          </svg>
          <p>Agrega preguntas desde el panel izquierdo para construir tu lista</p>
        </div>
      </div>
      <div class="export-bar">
        <div class="fn-wrap">
          <input class="fn-inp" id="fn-inp" type="text" placeholder="nombre-del-archivo" value="assignment">
          <span class="fn-ext" id="fn-ext">.txt</span>
        </div>
        <div class="fmt-tabs" id="fmt-tabs">
          <button class="fmt-tab active" data-fmt="txt">TXT</button>
          <button class="fmt-tab" data-fmt="md">MD</button>
          <button class="fmt-tab" data-fmt="pdf">PDF</button>
        </div>
        <button class="btn-exp" id="exp-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Exportar
        </button>
        <button class="btn-prev" id="prev-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          Vista previa
        </button>
      </div>
    </div>
  </div>

  <!-- Modal: Activar Licencia -->
  <div class="modal-bg" id="ai-modal-bg">
    <div class="modal" style="max-width:380px;">
      <div class="mh">
        <span class="mt">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--pr)" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          Activar Licencia
        </span>
        <button class="btn-ic" id="ai-modal-close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="mb" style="padding:16px;">
        <label style="display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--text);">Clave de Licencia</label>
        <input type="password" id="ai-api-key" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);margin-bottom:8px;" placeholder="Ingresa tu clave de acceso">
        <p style="font-size:11px;color:var(--mu);">Tu clave se guarda únicamente en este navegador.</p>
      </div>
      <div class="mf" style="justify-content:flex-end;">
        <button class="btn-dl" id="ai-save-btn">Activar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Vista previa -->
  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <div class="mh">
        <div class="mt">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
          </svg>
          <span id="modal-ttl">Vista previa</span>
          <span class="mbadge" id="modal-fmt">TXT</span>
        </div>
        <button class="btn-ic" id="modal-close">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="mb"><pre class="mpre" id="modal-body"></pre></div>
      <div class="mf">
        <button class="btn-ghost" id="modal-cpy">Copiar</button>
        <button class="btn-exp" id="modal-dl">Descargar</button>
      </div>
    </div>
  </div>

  <div id="pf"></div>
  <div class="toast" id="toast"></div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
